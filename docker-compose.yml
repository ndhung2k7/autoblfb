version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: facebook_comment_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  backend:
    build: .
    container_name: facebook_comment_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      DATABASE_NAME: facebook_comment_assistant
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USE_AI: ${USE_AI:-False}
    volumes:
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
